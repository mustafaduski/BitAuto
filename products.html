<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitAuto Products</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">

    <!-- Navigation -->
    <nav class="bg-blue-600 p-4">
        <a href="index.html" class="text-white text-lg">Back to Home</a>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8">Our Products</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Product Card Template -->
            <div class="bg-white shadow-md rounded-lg overflow-hidden transform transition duration-500 hover:scale-105">
                <img src="placeholder.jpg" alt="Product Image" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-lg font-semibold">Product Title</h2>
                    <p class="text-blue-600 font-bold">Price: 50 USDT</p>
                    <button onclick="openPaymentModal('50 USDT')" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Buy Now</button>
                </div>
            </div>

            <!-- Repeat Product Cards as needed -->
            <div class="bg-white shadow-md rounded-lg overflow-hidden transform transition duration-500 hover:scale-105">
                <img src="placeholder.jpg" alt="Product Image" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-lg font-semibold">Product Title</h2>
                    <p class="text-blue-600 font-bold">Price: 100 USDT</p>
                    <button onclick="openPaymentModal('100 USDT')" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Buy Now</button>
                </div>
            </div>
            <!-- Add more product cards as necessary -->
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="usdtPaymentModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">Make Payment</h2>
            <p class="mb-2">Please send the payment to the following wallet address:</p>
            <p id="walletAddress" class="font-mono text-lg bg-gray-100 p-2 rounded">TY4Q9H8V9J9B098UDE6AJAHEFB...</p>
            <button class="mt-2 bg-blue-600 text-white px-4 py-2 rounded" onclick="copyWalletAddress()">Copy Wallet Address</button>

            <h3 class="mt-4 text-lg font-semibold">Scan QR Code:</h3>
            <div class="bg-gray-100 w-40 h-40 flex items-center justify-center">
                <p>QR Code Placeholder</p> <!-- Replace with actual QR code image -->
            </div>

            <button onclick="closePaymentModal()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
